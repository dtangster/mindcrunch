version: '2'
services:
  ui_build:
    hostname: ui_build
    build:
      context: ./mindcrunch
      dockerfile: docker/ui_build/Dockerfile
    volumes:
    - ./mindcrunch/ui:/ui
  phoenix:
    depends_on:
    - ui_build
    - postgres
    hostname: phoenix
    build:
      context: ./mindcrunch
      dockerfile: docker/phoenix/Dockerfile
    ports:
    - 80:4000
    volumes:
    - ./mindcrunch/ui/dist:/mindcrunch/ui
  postgres:
    hostname: postgres
    build:
      context: ./mindcrunch
      dockerfile: docker/postgres/Dockerfile
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_DB=mindcrunch
    volumes:
    - /mindcrunch/postgresql:/var/lib/postgresql
